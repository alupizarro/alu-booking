<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #f3e8ff, #e0e7ff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.92);
    padding: 40px;
    border-radius: 18px;
    width: 360px;
    text-align: center;
}

h1 { color:#4b3f72; }

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #7c6bb1;
    color: white;
}

button:hover { background:#5b4a8a; }
</style>
</head>

<body>

<div class="card">
    <h1>📝 Registro</h1>

    <input placeholder="Usuario">
    <input placeholder="Email">
    <input type="password" placeholder="Contraseña">

    <button>Crear cuenta</button>

    <a href="/login">Ya tengo cuenta</a>
</div>

</body>
</html>
